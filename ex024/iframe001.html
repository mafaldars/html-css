<!DOCTYPE html>
<html lang="en-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iframe</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        iframe {
            width: 400px;
            height: 400px;
            border: 1px solid black;
            /* CSS é soberano perante inline */
        } 
    </style>
</head>
<body>

    <h1>Teste de iframe</h1>

    <!-- tamanho padrão 300x150 px -->

    <p>Aceder ao site do <a href="https://www.cursoemvideo.com/" target="_blank">Curso em Video</a> para aprender.</p>

    <p>Aceder ao site do 

        <iframe src="https://www.cursoemvideo.com/" frameborder="0" height="200px" width="400px">
            <a href="https://www.cursoemvideo.com/" target="_blank">Curso em Video</a>
        </iframe>
        
        para aprender.</p>

        <p>
            O site do <iframe src="https://www.google.com/" frameborder="0"></iframe> não funciona com &lt;iframe&gt;.

            <!-- há sites que recusam o iframe, como o Google -->
        </p>

        <p>
            Aceder ao meu
            <iframe src="https://mafaldars.github.io/" frameborder="0" height="200" width="400"></iframe>
            <a href="https://mafaldars.github.io/"></a>
            repositório.
        </p>
</body>
</html>
