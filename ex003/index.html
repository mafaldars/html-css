<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Test</title>
</head>
<body>
    <h1>Teste de Imagem</h1>

    <p>
        abaixo demonstrará o exemplo de uma imagem diretamente da pasta:
    </p>

    <img src="html5.png" alt="html5 logo">
    

    <p>
        tambem conseguimos carregar imagens que estão dentro de sub pastas: 
        <br>

        <img src="imagens/css3.png" alt="css3 logo">
    </p>

    <p>
        ainda podemos carregar imagens externas, atraves do URL das mesmas:

        <br>
        
        <img src="https://commons.wikimedia.org/wiki/File:Unofficial_JavaScript_logo_2.svg" alt="javascript logo">
        <!-- não é aconselhável, pois sea imagem sair do servidor, não irá aparecer a imagem mas irá aparecer o alt -->
    </p>
    
</body>
</html>
