<!DOCTYPE html>
<html lang="en-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo</title>
    <style>
        body{
            font-family: 'Courier New', Courier, monospace  ;
        }
    </style>
</head>
<body>

    <h1>Inserir vídeo com hospedagem local</h1>

    <p>
        Este vídeo está hospedado no meu próprio servidor.
    </p>

    <video width="550" controls autoplay loop>
        <source src="midia/video.mp4" type="video/mp4">

        <!-- mp4/m4v/webm/ogv

            há varios formatos de vídeo. É aconselhavél colocar todos os formatos, caso algum navegador não reconheça um dos mesmos. EX: O Safari ios não reconhece OGV 
        -->
    </video>

    <h1>Inserir vídeos do Youtube</h1>

    <iframe width="550" height="315" src="https://www.youtube.com/embed/Rc5G2TFBoT0?si=Fg7dD93FnQLVpMmf" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
</body>
</html>
