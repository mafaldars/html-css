<!DOCTYPE html>
<html lang="en-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /*

            #   = id
            .   = class
            :   = pseudo-class
            ::  = pseudo-element
            >   = children

        */

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: black;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active{
            color: rgb(133, 138, 136);
        }

        .especial {
            background-color: rgb(243, 134, 134);
        }

        .especial::before {
            content: ' → ';
        }

        .especial::after {
            content: ' ← ';


        }


    </style>
</head>
<body>
    <h1>Personalizar Links</h1>
    <ul>
        <!-- pseudo-classes são palavras que definem estados de elementos dentro de HTML -->

        <li><a href="https://github.com/mafaldars" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://www.youtube.com/watch?v=2Zg--ouGl7c" target="_blank" class="especial">Canal de Youtube</a></li>
        <li><a href="https://www.youtube.com/watch?v=gIqCCx3hRL8" target="_blank">AI Robots</a></li>
    </ul>

    <!-- pseudo-elementos podem mexer nas class, id, etc. Mexem diretamente no conteúdo periférico do elemento -->
    
</body>
</html>
