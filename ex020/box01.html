<!DOCTYPE html>
<html lang="en-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        h1 { /* elemento do tipo box-level */
            background-color: lightgray;
            height: 300px;
            width: 300px;

            border: 10px solid darkgray;
            
            padding: 10px 20px;

            margin: 20px auto 40px auto;
        
            outline: 5px dashed brown;

            /* o outline está dentro da margem, não a extrapola */
             
        }

        a { /* elemento do tipo inline-level */
            border-width: 10px;
            border-style: solid;
            border-color: darkgreen;
            color: black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>

    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como funciona.</p>

    
</body>
</html>
