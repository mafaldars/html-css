<!DOCTYPE html>
<html lang="en-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box CSS</title>
    <style>
        div.container {
            background-color: rgb(202, 94, 94);
            height: 100px;
            display: flex;
            flex-flow: column wrap;
        }

        div.items {
            background-color: rgb(194, 97, 213);
            border: 1px solid black;
            text-align: center;
            flex: auto;
            
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items">Exemplo de bloco A</div>
        <div class="items">Exemplo de bloco B</div>
        <div class="items">Exemplo de bloco C</div>
        <div class="items">Exemplo de bloco D</div>
        <div class="items">Exemplo de bloco E</div>
        <div class="items">Exemplo de bloco F</div>
        <div class="items">Exemplo de bloco G</div>
    </div>
    
</body>
</html>
