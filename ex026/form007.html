<!DOCTYPE html>
<html lang="en-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Teste de formulário</h1>

    <form action="login.php" method="get" autocomplete="on">
        <p>
            <label for="icidade">Cidade</label>
            <select name="cidade" id="icidade">
                <option value="" selected>--- Escolha ---</option>
                <optgroup label="Norte">
                    <option value="lisboa">Lisboa</option>
                    <option value="porto">Porto</option>
                    <option value="setubal">Setúbal</option>
                </optgroup>

                <optgroup label="Sul">
                    <option value="alentejo">Alentejo</option>
                    <option value="algarve">Algarve</option>
                    <option value="evora">Évora</option>
                </optgroup>
            </select>
        </p>

        <p>
            <label for="iprofissao">Profissão</label>
            <input type="text" name="profissao" id="iprofissao" list="listaprof">
            <datalist id="listaprof">
                <option>Admnistrador(a)</option>
                <option>Contabilista</option>
                <option>Desenvolvedor</option>
                <option>Professor</option>
            </datalist>
        </p>

        <p>
            <label for="imsg">Mensagem</label> <br>
            <textarea name="msg" id="imsg" cols="30" rows="10"></textarea>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
    
</body>
</html>
