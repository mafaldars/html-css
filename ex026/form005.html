<!DOCTYPE html>
<html lang="en-pt">
<head>
    <meta charset="UTF-8">

    <title>Formulários</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;

<body>
    <h1>Teste de formulário</h1>
    <form action="login.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="isexof"> <label for="isexof">Feminino</label> <br>
            <input type="radio" name="sexo" id="isexom"> <label for="isexom">Masculino</label>
        </fieldset>

        <fieldset>
            <legend>Desportos favoritos</legend>

            <input type="checkbox" name="futebol" id="ifutebol"> <label for="ifutebol">Futebol</label> <br>

            <input type="checkbox" name="golf" id="igolf"> <label for="igolf">Golf</label> <br>
